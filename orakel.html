<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Koeroe · het Duiven-Orakel</title>
<link rel="icon" href="./assets/logo.png">
<style>
  :root{
    --bg1:#0a0e1c; --bg2:#141d33; --bg3:#1d2a44;
    --ink:#f4efe4; --muted:#9fb0c8;
    --green:#3ea877; --green-soft:rgba(62,168,119,.16);
    --gold:#e8ba52; --gold-soft:rgba(232,186,82,.14);
    --line:rgba(255,255,255,.10);
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:var(--sans); color:var(--ink); overflow:hidden;
    background:
      radial-gradient(120% 90% at 50% -10%, #22335a 0%, var(--bg2) 40%, var(--bg1) 100%);
  }
  /* sterrenhemel */
  #sky{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  #sky .ster{position:absolute; border-radius:50%; background:#fff; opacity:.7;
    animation:twinkle 4s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.9}}
  #veer-laag{position:fixed; inset:0; z-index:5; pointer-events:none; overflow:hidden}
  .veer{position:absolute; top:-40px; font-size:22px; opacity:.85;
    animation:val linear forwards}
  @keyframes val{to{transform:translateY(110vh) rotate(320deg); opacity:0}}

  /* podium */
  .stage{position:relative; z-index:2; min-height:100svh; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:16px 18px calc(18px + env(safe-area-inset-bottom)); }
  .kop{width:100%; max-width:520px; display:flex; align-items:center;
    justify-content:space-between; gap:12px; padding:6px 2px 2px}
  .merk{display:flex; align-items:center; gap:9px; font-weight:700; letter-spacing:.02em}
  .merk .m-titel{font-size:.92rem}
  .merk .m-sub{font-size:.7rem; color:var(--muted); font-weight:600;
    text-transform:uppercase; letter-spacing:.14em}
  .voortgang{font-variant-numeric:tabular-nums; font-size:.78rem; color:var(--muted);
    font-weight:700; letter-spacing:.06em}

  .midden{flex:1; width:100%; display:flex; align-items:center; justify-content:center}
  .kaart{width:100%; max-width:520px; text-align:center;
    background:linear-gradient(180deg, rgba(38,52,84,.72), rgba(18,26,46,.72));
    border:1px solid var(--line); border-radius:26px;
    box-shadow:0 20px 60px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    padding:26px 22px 28px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    position:relative; overflow:hidden}
  .kaart::after{content:""; position:absolute; top:0; left:-60%; width:60%; height:100%;
    background:linear-gradient(100deg,transparent, rgba(255,255,255,.10), transparent);
    transform:skewX(-18deg)}
  .kaart.reveal::after{animation:sweep 1.1s ease}
  @keyframes sweep{from{left:-60%}to{left:130%}}
  .kaart.reveal{animation:pop .5s cubic-bezier(.2,.8,.25,1)}
  @keyframes pop{from{opacity:0; transform:translateY(14px) scale(.985)}to{opacity:1; transform:none}}
  .inhoud{animation:vervaag .6s ease both}
  @keyframes vervaag{from{opacity:0; transform:translateY(8px)}to{opacity:1}}

  /* Koeroe */
  .koeroe{width:180px; height:auto; display:block; margin:0 auto 6px;
    filter:drop-shadow(0 8px 20px rgba(0,0,0,.5)); animation:zweef 5s ease-in-out infinite}
  .koeroe.klein{width:104px; margin-bottom:2px}
  @keyframes zweef{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .titel-groot{font-family:var(--serif); font-size:2.5rem; line-height:1;
    margin:.1em 0 .05em; letter-spacing:.01em}
  .ondertitel{color:var(--gold); font-weight:700; text-transform:uppercase;
    letter-spacing:.28em; font-size:.72rem; margin-bottom:16px}
  .lead{font-family:var(--serif); font-size:1.08rem; line-height:1.6; color:#e7e0d2;
    margin:0 auto; max-width:40ch}

  .team-eyebrow{color:var(--muted); text-transform:uppercase; letter-spacing:.22em;
    font-size:.66rem; font-weight:700; margin-bottom:8px}
  .team-naam{font-family:var(--serif); font-size:2rem; line-height:1.1; color:var(--gold);
    margin:0 0 14px}
  .duiven-blok{margin:0 0 20px}
  .duiven-kop{color:var(--gold); text-transform:uppercase; letter-spacing:.16em;
    font-size:.66rem; font-weight:700; margin-bottom:7px}
  .duiven-lijst{font-family:var(--sans); font-size:1rem; color:#eae3d5; line-height:1.75}
  .duiven-lijst span{display:block}
  .profetie{font-family:var(--serif); font-size:1.12rem; line-height:1.62; color:#efe8da;
    margin:0 auto 20px; max-width:42ch}
  .profetie .glans{color:var(--gold)}
  .orakel-regels{display:grid; gap:8px; text-align:left; max-width:360px; margin:0 auto;
    border-top:1px solid var(--line); padding-top:16px}
  .oregel{display:flex; align-items:flex-start; gap:10px; font-size:.86rem; color:#dbe3ef}
  .oregel .ico{font-size:1rem; line-height:1.4}
  .oregel b{color:#fff; font-weight:700}
  .oregel .kd{color:var(--gold); font-weight:700}

  /* voet + knoppen */
  .voet{width:100%; max-width:520px; display:flex; flex-direction:column; align-items:center;
    gap:9px; padding-top:16px}
  .knop{appearance:none; border:0; cursor:pointer; font-family:var(--sans);
    font-size:1.02rem; font-weight:800; color:#08170f; letter-spacing:.01em;
    background:linear-gradient(180deg,#54c68e,#2f9866);
    padding:15px 24px; border-radius:16px; width:100%;
    box-shadow:0 10px 24px rgba(47,152,102,.35), inset 0 1px 0 rgba(255,255,255,.4)}
  .knop:active{transform:translateY(1px)}
  .knop.goud{background:linear-gradient(180deg,#f3cd72,#dca63f); color:#241a05;
    box-shadow:0 10px 24px rgba(220,166,63,.35), inset 0 1px 0 rgba(255,255,255,.5)}
  .hint{font-size:.72rem; color:var(--muted)}
  .terug{position:absolute; left:12px; top:12px; z-index:6; background:rgba(255,255,255,.06);
    border:1px solid var(--line); color:var(--muted); width:38px; height:38px; border-radius:12px;
    font-size:1.1rem; cursor:pointer; display:none; align-items:center; justify-content:center}
  .terug.aan{display:flex}
  .dots{display:flex; gap:5px; flex-wrap:wrap; justify-content:center; max-width:300px}
  .dots i{width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.22)}
  .dots i.nu{background:var(--gold); transform:scale(1.35)}
  .dots i.klaar{background:rgba(62,168,119,.7)}

  @media (min-width:560px){ .titel-groot{font-size:3rem} .koeroe{width:200px} }
</style>
</head>
<body>
  <div id="sky"></div>
  <div id="veer-laag"></div>
  <button class="terug" id="terug" aria-label="Terug">‹</button>

  <div class="stage" id="stage">
    <div class="kop">
      <div class="merk">
        <span aria-hidden="true">🔮</span>
        <span>
          <span class="m-titel">Koeroe</span><br>
          <span class="m-sub">het Duiven-Orakel</span>
        </span>
      </div>
      <div class="voortgang" id="voortgang"></div>
    </div>

    <div class="midden">
      <div class="kaart" id="kaart"></div>
    </div>

    <div class="voet">
      <div class="dots" id="dots"></div>
      <button class="knop" id="knop">Begin de séance ▸</button>
      <div class="hint">tik op het scherm · of druk op spatie</div>
    </div>
  </div>

<script>
/* ====== Koeroe (SVG) ====== */
const KOEROE = `
<svg class="koeroe" viewBox="0 0 200 214" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Koeroe het orakel">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#8ff0c2" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#8ff0c2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hoed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b2e73"/><stop offset="100%" stop-color="#241a4a"/>
    </linearGradient>
    <linearGradient id="lijf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93a9c6"/><stop offset="100%" stop-color="#6f88a7"/>
    </linearGradient>
  </defs>
  <ellipse cx="100" cy="126" rx="82" ry="82" fill="url(#glow)"/>
  <!-- staart -->
  <path d="M96 168 q-46 10 -60 30 q28 6 66 -6 z" fill="#5f7794"/>
  <!-- lijf -->
  <ellipse cx="100" cy="140" rx="47" ry="53" fill="url(#lijf)"/>
  <!-- buik -->
  <ellipse cx="102" cy="152" rx="31" ry="38" fill="#b9cbe0"/>
  <!-- vleugel -->
  <path d="M104 104 q42 6 40 62 q-22 16 -44 -4 q-8 -30 4 -58 z" fill="#6c85a4"/>
  <!-- kop -->
  <circle cx="100" cy="88" r="31" fill="#9db2ce"/>
  <!-- nek-glans -->
  <path d="M78 96 a31 31 0 0 0 44 8 q-6 14 -22 15 q-16 -3 -22 -23z" fill="#4bbf8a" opacity=".55"/>
  <!-- snavel -->
  <path d="M70 88 l-17 5 l17 6 z" fill="#e7a94a"/>
  <!-- oog -->
  <circle cx="86" cy="84" r="5.2" fill="#0d1420"/>
  <circle cx="87.6" cy="82.3" r="1.6" fill="#fff"/>
  <!-- derde oog -->
  <circle cx="103" cy="72" r="6.4" fill="#f4d888"/>
  <circle cx="103" cy="72" r="3" fill="#7a5a12"/>
  <!-- hoedrand -->
  <ellipse cx="104" cy="60" rx="45" ry="11" fill="#2b2350"/>
  <!-- hoedpunt -->
  <path d="M74 60 Q92 -6 150 10 Q126 34 132 60 Q104 52 74 60 Z" fill="url(#hoed)"/>
  <!-- sterren op hoed -->
  <text x="96" y="40" font-size="15" fill="#f4d888">✦</text>
  <text x="118" y="26" font-size="10" fill="#f4d888">✦</text>
  <text x="112" y="52" font-size="9" fill="#cbb6ff">✦</text>
  <!-- sprankels -->
  <text x="24" y="70" font-size="15" fill="#f4d888" opacity=".9">✧</text>
  <text x="168" y="96" font-size="13" fill="#8ff0c2" opacity=".9">✦</text>
  <text x="150" y="150" font-size="11" fill="#f4d888" opacity=".8">✧</text>
</svg>`;

/* ====== Data ====== */
const INTRO = {
  type:'intro',
  titel:'Koeroe',
  sub:'het Duiven-Orakel',
  lead:'Zeventien teams. Eenenvijftig duiven. Eén half-dichtgeknepen oog dat de toekomst leest. Koeroe heeft de sterren geraadpleegd, de wind geproefd en per ongeluk een graankorrel ingeslikt. De séance kan beginnen.'
};

const TEAMS = [
  {team:'Arjan Koenen', duiven:['Eowyn','Frenkie','Mees de Mus'], label:'Minst waarschijnlijke duif', kd:'Mees de Mus', omen:'Verwar de mus niet met het avondeten.',
   p:`Koeroe ziet een leger van drie: een schildmaagd, een middenvelder en… een <span class="glans">mus</span>. Ja, een mus. De kosmos heeft het dubbel gecheckt. Toch fluistert het heelal dat wie een mus tussen de duiven durft te zetten, óf een ziener is, óf de weg volledig kwijt. Beide leveren punten op. Vermoedelijk.`},
  {team:'Bart & Lobke', duiven:['Cabo!!','Mbappé','Rio'], label:'Duif met de snelste benen', kd:'Mbappé', omen:'Paspoort niet vergeten.',
   p:`Twee vakantiebestemmingen en een Fransman met turbobenen. Koeroe voorspelt: deze duiven vertrekken niet om te koersen, maar om <span class="glans">in te checken bij een all-inclusive</span>. Mbappé is al onderweg; de andere twee wachten op de shuttlebus. Snelheid gegarandeerd, aankomst een open vraag.`},
  {team:'Eddy & Jolanda', duiven:['Bokkepoot','Bosse Bol','Tompouce'], label:'Duif met de meeste honger', kd:'Tompouce', omen:'Niet vervoeren bij warm weer.',
   p:`Een team volledig opgetrokken uit gebak. Koeroe ruikt banketbakkersroom op de wind. De profetie is glashelder: waar anderen op thermiek vliegen, vliegen deze op <span class="glans">suikerspiegel</span>. Let op de Tompouce — die bezwijkt onder druk, maar wát een laagjes.`},
  {team:'Gilles & Tessa', duiven:['Ceesie','Charlie','Sep'], label:'Zwaar onderschatte duif', kd:'Sep', omen:'Onderschatting wordt kosmisch afgestraft.',
   p:`Drie namen zó bescheiden dat de sterren ze bijna over het hoofd zagen. En dáár, zegt Koeroe, schuilt het gevaar. Onderschat Ceesie niet. Onderschat vooral <span class="glans">Sep</span> niet. Koeroe onderschatte ooit een Sep en praat er tot op heden niet over.`},
  {team:'Hugo & Marieke', duiven:['Aline','Emma','Marie'], label:'Duif met de beste looks', kd:'Aline', omen:'Haast is voor amateurs.',
   p:`Drie dames, één elegant complot. Koeroe ziet gratie, hij ziet klasse, hij ziet… geen enkele haast. Dit team komt niet als eerste thuis — dit team komt <span class="glans">op tijd</span> thuis. Er is een verschil, en alleen Aline kent het.`},
  {team:'Jan & Monique', duiven:['Armando 2','Gunnar Sønsteby','Simo Häyhä'], label:'Meest geruisloze duif', kd:'Simo Häyhä', omen:'Maakt geen geluid. Maakt geen fouten.',
   p:`Een sequel, een verzetsheld en de dodelijkste scherpschutter uit de geschiedenis. Koeroe krijgt het koud. Dit is geen duiventeam, dit is een <span class="glans">geheime operatie</span>. Simo Häyhä vliegt niet — Simo Häyhä wácht. En Armando 2 is aantoonbaar beter dan Armando 1, aldus de sterren.`},
  {team:'Jo & Monique', duiven:['Amy','Elio','Teun'], label:'Meest onmisbare duif', kd:'Teun', omen:'Familie kun je niet uitschakelen.',
   p:`Koeroe ziet drie duiven die elkaars zinnen afmaken. Harmonie, zegt de kosmos. Verontrustend véél harmonie. Teun leidt, Amy corrigeert, Elio doet alsof hij luistert. Een <span class="glans">gezin</span>. Gezinnen winnen zelden de sprint, maar raken nooit verloren.`},
  {team:'Lois & Wessel', duiven:['Geertje','Moffel','Piertje'], label:'Meest ontspannen duif', kd:'Moffel', omen:'Komt aan wanneer het uitkomt.',
   p:`Geertje, Moffel en Piertje — namen die klinken als een knus dorp met precies één pinautomaat. Koeroe voorspelt: deze duiven koersen niet, ze <span class="glans">wandelen</span>. Maar onderschat de wandelaar nooit: de wandelaar komt altijd aan, meestal mét een verhaal.`},
  {team:'Marco & Kelsey', duiven:['Duif 1','Duif 2','Duif 3 – leukere namen volgen'], label:'Duif die nog een naam zoekt', kd:'Duif 2', omen:'Namen volgen. Punten misschien ook.',
   p:`Koeroe tuurt in de nevel en leest: “Duif 1. Duif 2. Duif 3 – leukere namen volgen.” De sterren zwijgen eerbiedig. Nog nooit zag het orakel zóveel potentie in zó weinig moeite. Deze duiven weten <span class="glans">zelf nog niet wie ze zijn</span> — en dát maakt ze volstrekt onvoorspelbaar. Levensgevaarlijk.`},
  {team:'Maurice & Simone', duiven:['Alberto Contador','Michael Schumacher','Rafael Nadal'], label:'Duif met het grootste ego', kd:'Michael Schumacher', omen:'Zelfgenoegzaamheid is de enige tegenstander.',
   p:`Een Tourwinnaar, een Formule 1-legende en de koning van het gravel. Koeroe ziet een <span class="glans">podium dat zichzelf al heeft uitgeroepen</span>. Het probleem met kampioenen? Ze denken dat het vanzelf gaat. Schumacher pakt de bocht, Nadal de rally, Contador de berg — en de finish lacht in haar vuistje.`},
  {team:'Niek & Wiet', duiven:['Big Virg','Jaap','Torx'], label:'Duif met de breedste borst', kd:'Big Virg', omen:'Groot. Ongepolijst. Onvermijdelijk.',
   p:`Een reus, een Jaap en een schroefkop. Koeroe voelt rauwe, ongeslepen kracht. Big Virg torent boven alles uit, Torx draait zich <span class="glans">vast in de overwinning</span>, en Jaap… Jaap is er ook. Onmisbaar, die Jaap. Vraag niet waarom, dat weet de kosmos ook niet.`},
  {team:'Niene & Aron', duiven:['Dumfel Demfries','Noa Kort','Roekoeman'], label:'Duif met de meeste loopkracht', kd:'Dumfel Demfries', omen:'Let op de rechterflank.',
   p:`Dumfel Demfries dendert over de flank, Roekoeman waakt in de schemer, en Noa Kort houdt het — de naam zegt het al — <span class="glans">kort</span>. Koeroe ziet een team dat harder loopt dan het zelf doorheeft. Let op die rechtsback: die levert de voorzet waar niemand op rekende.`},
  {team:'Paul & Nicolette', duiven:['Max V/D Bandijk','Milow V/D Bandijk','Moos V/D Bandijk'], label:'Blauwst bloedige duif', kd:'Max V/D Bandijk', omen:'De dijk breekt nooit.',
   p:`Drie duiven, één achternaam: de dynastie <span class="glans">Van De Bandijk</span>. Koeroe buigt voor zoveel bloedlijn. Dit is geen team, dit is een familiebedrijf, en het familiebedrijf duldt geen concurrentie aan de dijk. Max opent, Milow bevestigt, Moos maakt af. Adel verplicht.`},
  {team:'Rick & Ezra', duiven:['Ach, ik kom er zo op','Die daar','Dinges'], label:'Makkelijkst te vergeten duif', kd:'Dinges', omen:'Je vergeet ze — tot het te laat is.',
   p:`Koeroe leest de namen driemaal en legt de kristallen bol even weg. “Ach, ik kom er zo op.” “Die daar.” “Dinges.” Dit team heeft het <span class="glans">uitstel tot kunstvorm</span> verheven. En tóch — net als je ze vergeet, zijn ze er. Naamloos, gezichtsloos, en verduiveld lastig te verslaan.`},
  {team:'Sjoerd & Marije', duiven:['Ben de Pompoen','Dodo','SixSeven'], label:'Meest opvallende duif', kd:'Dodo', omen:'Weet niet dat vliegen onmogelijk is.',
   p:`De architect van dit alles stuurt een pompoen, een uitgestorven vogel en een getal de hemel in. Koeroe waardeert de brutaliteit. De <span class="glans">Dodo kán niet vliegen</span> — dat weet de Dodo niet, en dáárin schuilt zijn kracht. Ben de Pompoen rolt waar anderen fladderen. SixSeven weet zelf niet of het zes of zeven is, en dat houdt de tegenstand klaarwakker.`},
  {team:'Tim & Kim', duiven:['Framboos','Kiwi','Senna'], label:'Duif met de meeste pk\'s', kd:'Senna', omen:'Niet blenden.',
   p:`Een fruitschaal met een raceziel. Koeroe ziet vitamines én benzine. Framboos en Kiwi brengen frisheid, Senna brengt het <span class="glans">gaspedaal</span>. Zolang niemand ze per ongeluk in een smoothie gooit, komt dit team verrassend ver.`},
  {team:'Tom Aarsman', duiven:['Boracay','Cebu','Manila'], label:'Meest tropische duif', kd:'Manila', omen:'Koerst richting het strand.',
   p:`Drie Filipijnse parels, één duif in z'n eentje aan het roer. Koeroe ziet een solozeiler met een tropische vloot. Terwijl anderen met z'n tweeën twijfelen, beslist Tom <span class="glans">alleen</span> — snel, en doorgaans richting het strand. Manila wijst de weg, Cebu volgt, Boracay zit al aan de cocktail.`}
];

const FINALE = {
  type:'finale',
  titel:'De Slotprofetie',
  lead:`En zo knijpt Koeroe zijn ene goede oog dicht. Zeventien teams, eenenvijftig duiven, en één waarheid die de kosmos blijft herhalen: de winnaar zit niet in de snelste duif, maar in de duif die vergeet dat verliezen bestaat. Koeroe voorspelt een seizoen van onwaarschijnlijke helden, gebakken lucht, en minstens één mus die zich met verve voordoet als duif. Wie wint? Dát, stervelingen, heeft het orakel allang gezien — maar de sterren lieten Koeroe zweren te zwijgen tot de laatste vlucht. Koeroe… koeroe.`
};

const SCHERMEN = [INTRO, ...TEAMS, FINALE];

/* ====== Render ====== */
const kaart = document.getElementById('kaart');
const knop = document.getElementById('knop');
const hint = document.querySelector('.hint');
const voortgang = document.getElementById('voortgang');
const dots = document.getElementById('dots');
const terug = document.getElementById('terug');
let i = 0;
let bezig = false;

const teamAantal = TEAMS.length;
TEAMS.forEach(()=>{ const d=document.createElement('i'); dots.append(d); });
const dotEls = [...dots.children];

function render(){
  const s = SCHERMEN[i];
  kaart.classList.remove('reveal'); void kaart.offsetWidth; kaart.classList.add('reveal');

  if(s.type==='intro'){
    kaart.innerHTML = `<div class="inhoud">${KOEROE}
      <h1 class="titel-groot">${s.titel}</h1>
      <div class="ondertitel">${s.sub}</div>
      <p class="lead">${s.lead}</p></div>`;
    knop.textContent = 'Begin de séance ▸'; knop.classList.remove('goud');
    voortgang.textContent = ''; hint.style.visibility='visible';
  } else if(s.type==='finale'){
    kaart.innerHTML = `<div class="inhoud">${KOEROE.replace('koeroe"','koeroe" ')}
      <div class="ondertitel" style="margin-top:6px">Het orakel heeft gesproken</div>
      <h1 class="titel-groot" style="color:var(--gold);font-size:2rem;margin-bottom:14px">${s.titel}</h1>
      <p class="profetie">${s.lead}</p></div>`;
    knop.textContent = '↺ Roep het orakel opnieuw'; knop.classList.add('goud');
    voortgang.textContent = 'FINALE'; hint.style.visibility='hidden';
    veerRegen();
  } else {
    const nr = i; // team index = i (want intro=0)
    kaart.innerHTML = `<div class="inhoud">
      ${KOEROE.replace('class="koeroe"','class="koeroe klein"')}
      <div class="team-eyebrow">Voorspelling ${nr} / ${teamAantal}</div>
      <h2 class="team-naam">${s.team}</h2>
      <div class="duiven-blok">
        <div class="duiven-kop">De 3 gekozen duiven</div>
        <div class="duiven-lijst">${s.duiven.map(d=>`<span>${d}</span>`).join('')}</div>
      </div>
      <p class="profetie">${s.p}</p>
      <div class="orakel-regels">
        <div class="oregel"><span class="ico">✨</span><span><b>${s.label}:</b> <span class="kd">${s.kd}</span></span></div>
        <div class="oregel"><span class="ico">⚠️</span><span><b>Let op:</b> ${s.omen}</span></div>
      </div></div>`;
    knop.textContent = nr < teamAantal ? 'Volgende voorspelling ▸' : 'De slotprofetie ▸';
    knop.classList.remove('goud');
    voortgang.textContent = nr + ' / ' + teamAantal;
    hint.style.visibility='visible';
  }

  // dots
  dotEls.forEach((d,k)=>{
    d.className=''; const teamIdx=k+1;
    if(teamIdx===i) d.classList.add('nu');
    else if(teamIdx<i) d.classList.add('klaar');
  });
  terug.classList.toggle('aan', i>0);
  kaart.scrollTop = 0;
}

function volgende(){
  if(bezig) return;
  if(i >= SCHERMEN.length-1){ i=0; render(); return; } // vanaf finale: opnieuw
  bezig=true; i++; render();
  setTimeout(()=>bezig=false, 320);
}
function vorige(){ if(bezig||i<=0) return; bezig=true; i--; render(); setTimeout(()=>bezig=false,320); }

/* ====== Interactie ====== */
knop.addEventListener('click', e=>{ e.stopPropagation(); volgende(); });
terug.addEventListener('click', e=>{ e.stopPropagation(); vorige(); });
document.getElementById('stage').addEventListener('click', e=>{
  if(e.target.closest('.knop')||e.target.closest('.terug')) return;
  volgende();
});
document.addEventListener('keydown', e=>{
  if(e.key===' '||e.key==='Enter'||e.key==='ArrowRight'){ e.preventDefault(); volgende(); }
  else if(e.key==='ArrowLeft'){ e.preventDefault(); vorige(); }
});

/* ====== Sfeer: sterren + veren ====== */
(function sterren(){
  const sky=document.getElementById('sky'); let html='';
  for(let n=0;n<70;n++){
    const s=(Math.random()*2+1).toFixed(1);
    const x=(Math.random()*100).toFixed(2), y=(Math.random()*100).toFixed(2);
    const del=(Math.random()*4).toFixed(2);
    html+=`<span class="ster" style="width:${s}px;height:${s}px;left:${x}%;top:${y}%;animation-delay:${del}s"></span>`;
  }
  sky.innerHTML=html;
})();
function veerRegen(){
  const laag=document.getElementById('veer-laag');
  for(let n=0;n<18;n++){
    const v=document.createElement('div'); v.className='veer';
    v.textContent = Math.random()<.5 ? '🪶':'✦';
    v.style.left=(Math.random()*100)+'%';
    v.style.animationDuration=(3+Math.random()*3)+'s';
    v.style.animationDelay=(Math.random()*1.2)+'s';
    v.style.fontSize=(14+Math.random()*16)+'px';
    laag.append(v);
    setTimeout(()=>v.remove(), 6500);
  }
}

render();
</script>
</body>
